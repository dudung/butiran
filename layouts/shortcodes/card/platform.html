<div class="platform-card" style="
  display: inline-block;
  vertical-align: top;
  width: 220px;
  margin: 0.5em;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 1em;
  text-align: center;
  background-color: #fff;
  box-shadow: 0 2px 5px rgba(0,0,0,0.05);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
">
  {{ if .Get "logo" }}
    <img src="{{ .Get "logo" | relURL }}" alt="{{ .Get "name" }} logo"
         style="max-width: 100px; height: auto; display: block; margin: 0 auto;">
  {{ end }}
  <h3 style="margin:0.2em 0;">{{ .Get "name" }}</h3>
  <p style="margin:0.2em 0 0; color:#555;">
    {{ .Get "count" }} works
    &nbsp;|&nbsp;
    <a href="{{ .Get "link" }}">View all</a>
  </p>
</div>
